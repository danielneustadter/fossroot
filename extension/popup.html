<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        --fg: #1a1c1e;
        --muted: #6b7280;
        --ok: #2e9e5b;
        --warn: #d97706;
        --err: #cc3333;
        --card: rgba(0, 0, 0, 0.04);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #dcdfe4;
          --muted: #9aa0a6;
          --card: rgba(255, 255, 255, 0.06);
        }
      }
      body {
        width: 320px;
        margin: 0;
        padding: 14px 16px;
        font: 13px/1.4 system-ui, -apple-system, Segoe UI, sans-serif;
        color: var(--fg);
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      h1 {
        font-size: 15px;
        margin: 0;
      }
      .sub {
        color: var(--muted);
        font-size: 11px;
      }
      .card {
        background: var(--card);
        border-radius: 8px;
        padding: 12px;
      }
      .big {
        font-size: 26px;
        font-weight: 600;
        line-height: 1.1;
      }
      .ok {
        color: var(--ok);
      }
      .warn {
        color: var(--warn);
      }
      .err {
        color: var(--err);
      }
      .row {
        display: flex;
        justify-content: space-between;
        margin-top: 6px;
        color: var(--muted);
      }
      .foot {
        margin-top: 10px;
        color: var(--muted);
        font-size: 11px;
      }
      code {
        font-family: ui-monospace, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Fossroot</h1>
      <span class="sub">DoD PKI trust status</span>
    </header>
    <div id="content" class="card">Checking the local agent…</div>
    <div class="foot" id="foot"></div>
    <script src="popup.js"></script>
  </body>
</html>
